  - generic [ref=e4]:
    - heading "Agent Instructions" [level=2] [ref=e5]
    - paragraph [ref=e6]: Build a calmer upsell page, but preserve evidence before deciding implementation details.
    - generic [ref=e7]: "LAZYWEB REPORT - AGENT HANDOFF Use this report as a starting point for implementing a desktop SaaS upsell pricing page. TOP RECOMMENDATIONS (do first): 1. Add a value-led hero before plan cards. 2. Use plan comparison to reduce upgrade uncertainty. 3. Add annual anchoring and a savings badge. INDEX ON: plan comparison, annual anchoring, trial/risk reversal. DO NOT OVER-INDEX ON: mobile-only urgency timers or dating-app feature walls. DIVE FURTHER: lazyweb_find_similar on comparison-grid paywalls."
  - generic [ref=e8]:
    - heading "Recommendations / Next Steps" [level=2] [ref=e9]
    - list [ref=e10]:
      - listitem [ref=e11]: Lead with the upgrade outcome before price. Users should see what paid unlocks before comparing plans. This is supported by the Tinder feature-wall family and comparison-grid paywalls.
      - listitem [ref=e12]: Show Free vs Pro directly. A two-column comparison grid makes the upgrade feel like a product decision instead of a price decision.
      - listitem [ref=e13]: Anchor annual without making it feel forced. Use a default annual card with per-month math and a savings badge, but keep monthly visible.
    - generic [ref=e14]: "Mock-frame: hero / plan cards / comparison grid / CTA / FAQ"
