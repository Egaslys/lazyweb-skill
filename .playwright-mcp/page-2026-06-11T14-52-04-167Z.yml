  - generic [ref=e31]:
    - heading "Patterns" [level=2] [ref=e32]
    - article [ref=e33]:
      - heading "Comparison grid reduces ambiguity" [level=3] [ref=e34]
      - paragraph [ref=e35]: Seen in AccuWeather, Perplexity, Washington Post, and The Weather Channel. Users can inspect exactly what changes when they pay.
    - article [ref=e36]:
      - heading "Annual anchoring changes price perception" [level=3] [ref=e37]
      - paragraph [ref=e38]: Seen in Audible and Babbel. Per-period math makes annual commitment feel smaller than a single yearly number.
    - article [ref=e39]:
      - heading "Trial or guarantee creates risk reversal" [level=3] [ref=e40]
      - paragraph [ref=e41]: Seen in Peloton and Spotify. It helps when users are interested but not yet convinced.
  - generic [ref=e42]:
    - heading "Anti-Patterns" [level=2] [ref=e43]
    - list [ref=e44]:
      - listitem [ref=e45]: Do not lead with a countdown timer; it can damage trust for a B2B SaaS upgrade.
      - listitem [ref=e46]: Do not hide monthly pricing; forced annual defaults can read as hostile.
      - listitem [ref=e47]: Do not stack benefits without a visual hierarchy; it creates scanning work.
